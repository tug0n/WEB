<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt bàn</title>
    <style>
        form{
            background:white;
            padding: 20px;
            border-radius: 10px;
            max-width: auto;
        }
        body{
            font-size: 20px;
        }
        h2{
            background: linear-gradient(150deg,#4d592b,rgb(128, 90, 0));
            color: #fff;
            text-align: center;
            padding: 20px;
            border-radius:20px;
            font-size: 25px;
            font-family:sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
        }
        input{
            width: 100%;
            padding: 8px 0;
            text-indent: 10px;
            margin: 5px 0;
            color: brown;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 15px;
        }
        .submit{
            text-align: center;
            margin: 15px 0px;
         }
        select{
            width: 35%;
            padding: 8px;
            margin: 5px 0;
            color: brown;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 15px;
        }
        input[type="button"]{
            background: linear-gradient(150deg,#4d592b,rgb(128, 90, 0));
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 16px;
            width: 30%;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .button{
            text-align: center;
        }
        input[type="submit"]{
            background: linear-gradient(150deg,#4d592b,rgb(128, 90, 0));
            color: white;
            border: none;
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input[type="submit"]:hover {
            transform: translateY(-2px);
            background:linear-gradient(150deg,rgb(128, 90, 0),#4d592b);
            box-shadow: 0 10px 25px rgba(101, 91, 31, 0.4);
        }
        input[type="button"]:hover {
            transform: translateY(-2px);
            background:linear-gradient(150deg,rgb(128, 90, 0),#4d592b);
            box-shadow: 0 10px 25px rgba(101, 91, 31, 0.4);
        }
    </style>
</head>
<body>
    <form action="" method="" class="form" onsubmit="closeModal(event)">
        <h2>Đặt bàn</h2>
        <label>Họ và tên: </label>
        <input type="text" id="hoTen"><br>
        <label>Số điện thoại: </label>
        <input type="number" id="sdt"><br>
        <label>Số lượng khách: </label>
        <input type="number" id="soLuong"><br>
        Ngày: <select>
            <option>Thứ Hai</option>
            <option>Thứ Ba</option>
            <option>Thứ Tư</option>
            <option>Thứ Năm</option>
            <option>Thứ Sáu</option>
        </select>
        Thời gian: <select> 
            <option>17:00</option>
            <option>18:00</option>
            <option>19:00</option>
            <option>20:00</option>
        </select><br>
        <label>Đặt trước món:</label>
        <select multiple size="1">
            <optgroup label="Bữa sáng">
                <option>Phở - 65.000đ</option>
                <option>Cơm Sườn - 50.000đ</option>
                <option>Bánh Mì - 30.000đ</option>
            </optgroup>
            <optgroup label="Bữa chính">
                <option>Cá Kho Tộ - 75.000đ</option>
                <option>Canh Cua - 85.000đ</option>
                <option>Bún Bò - 50.000đ</option>
            </optgroup>
            <optgroup label="Tráng miệng">
                <option>Bánh Flan - 30.000đ</option>
                <option>Bánh Kem - 55.000đ</option>
                <option>Chè - 30.000đ</option>
            </optgroup>
        </select><br>
        <label>Email: </label>
        <input type="email" id="email"><br>
        <input type="submit" value="Đặt bàn" class="submit">
        <div class="button"><input type="button" value="Quay lại" onclick="goBack()"></div>
    </form>
</body>
<script>
    function goBack() {
        window.parent.document.getElementById("bookingModal").style.display = "none";
    }
    function closeModal(e) {
        e.preventDefault();
        window.parent.document.getElementById("bookingModal").style.display = "none";
    }
</script>
</html>
